name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Test
        working-directory: app
        run: npm test

      - name: Typecheck
        working-directory: app
        run: npm run typecheck

      - name: Build
        working-directory: app
        env:
          VITE_BASE_PATH: ./
        run: npm run build

  publish-web:
    name: Publish web release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build web bundle
        working-directory: app
        env:
          VITE_BASE_PATH: ./
        run: npm run build

      - name: Package web bundle
        shell: bash
        run: |
          mkdir -p release-assets
          (cd app/dist && zip -r "../../release-assets/calabash-web-${GITHUB_REF_NAME}.zip" .)

      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "Calabash ${GITHUB_REF_NAME}"
            echo
            awk -v version="$version" '
              $0 ~ "^## " version "([ -]|$)" { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md
            echo
            echo "Assets:"
            echo "- Web bundle: static browser build for self-hosting or archive validation."
            echo "- Desktop binaries: Windows, Linux, and macOS builds are attached by the Tauri release job."
          } > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == v0.* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Calabash ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              ${prerelease_flag}
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "Calabash ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --verify-tag \
              ${prerelease_flag}
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: calabash-web-${{ github.ref_name }}
          path: release-assets/*

  detect_desktop:
    name: Detect desktop shell
    runs-on: ubuntu-latest
    outputs:
      has_tauri: ${{ steps.detect.outputs.has_tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Tauri project
        id: detect
        shell: bash
        run: |
          if [[ -f src-tauri/tauri.conf.json || -f src-tauri/Tauri.toml ]]; then
            echo "has_tauri=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tauri=false" >> "$GITHUB_OUTPUT"
          fi

  publish_tauri:
    name: Build desktop (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    needs:
      - publish-web
      - detect_desktop
    if: needs.detect_desktop.outputs.has_tauri == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-arm64
            args: --target aarch64-apple-darwin --no-bundle
          - platform: macos-latest
            label: macos-x64
            args: --target x86_64-apple-darwin --no-bundle
          - platform: ubuntu-22.04
            label: linux-x64
            args: --no-bundle
          - platform: windows-latest
            label: windows-x64
            args: --no-bundle
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install Rust stable for macOS targets
        if: startsWith(matrix.platform, 'macos')
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust stable
        if: ${{ !startsWith(matrix.platform, 'macos') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Install Tauri CLI dependencies
        run: npm ci

      - name: Build and upload Tauri binaries
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Calabash ${{ github.ref_name }}
          releaseBody: See the release notes and assets for platform downloads.
          releaseDraft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          projectPath: .
          args: ${{ matrix.args }}
          assetNamePattern: Calabash_[version]_[platform]_[arch][setup].[ext]
          uploadPlainBinary: true
          includeUpdaterJson: false

      - name: Collect desktop workflow artifact
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
        run: |
          mkdir -p release-assets/desktop
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const artifacts = JSON.parse(process.env.ARTIFACT_PATHS || '[]');
          let copied = 0;
          for (const file of artifacts) {
            if (!fs.existsSync(file)) {
              console.warn(`Missing Tauri artifact: ${file}`);
              continue;
            }
            fs.cpSync(file, path.join('release-assets', 'desktop', path.basename(file)), { recursive: true });
            copied++;
          }
          if (copied === 0) {
            throw new Error('No Tauri artifacts were available to upload.');
          }
          NODE

      - name: Upload desktop workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: calabash-desktop-${{ github.ref_name }}-${{ matrix.label }}
          path: release-assets/desktop/*
