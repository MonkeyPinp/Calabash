name: Sync to CNB

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-cnb-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Mirror Git refs to CNB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync to CNB
        uses: docker://tencentcom/git-sync
        env:
          PLUGIN_TARGET_URL: https://cnb.cool/Guesswhat-Studio/Calabash.git
          PLUGIN_AUTH_TYPE: https
          PLUGIN_USERNAME: cnb
          PLUGIN_PASSWORD: ${{ secrets.CNB_TOKEN }}
          PLUGIN_FORCE: "true"
          PLUGIN_PUSH_TAGS: "true"
