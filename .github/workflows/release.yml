name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Test
        working-directory: app
        run: npm test

      - name: Typecheck
        working-directory: app
        run: npm run typecheck

      - name: Build
        working-directory: app
        env:
          VITE_BASE_PATH: ./
        run: npm run build

  publish-web:
    name: Publish web release
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build web bundle
        working-directory: app
        env:
          VITE_BASE_PATH: ./
        run: npm run build

      - name: Package web bundle
        shell: bash
        run: |
          mkdir -p release-assets
          (cd app/dist && zip -r "../../release-assets/calabash-web-${GITHUB_REF_NAME}.zip" .)

      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "Calabash ${GITHUB_REF_NAME}"
            echo
            awk -v version="$version" '
              $0 ~ "^## " version "([ -]|$)" { capture = 1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md
            echo
            echo "Assets:"
            echo "- Web bundle: static browser build for self-hosting or archive validation."
            echo "- Desktop builds: Windows and Linux plain binaries, plus macOS DMG images for Apple Silicon and Intel Macs."
            echo
            echo "Code signing policy:"
            echo "- Free code signing provided by SignPath.io, certificate by SignPath Foundation, for release artifacts signed under the Calabash code signing policy after program acceptance."
            echo "- Policy: https://github.com/Guesswhat-Studio/Calabash/blob/main/docs/CODE_SIGNING.md"
          } > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          prerelease_flag=""
          if [[ "${GITHUB_REF_NAME}" == v0.* ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "Calabash ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              ${prerelease_flag}
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "Calabash ${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --verify-tag \
              ${prerelease_flag}
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: calabash-web-${{ github.ref_name }}
          path: release-assets/*

  detect_desktop:
    name: Detect desktop shell
    runs-on: ubuntu-latest
    outputs:
      has_tauri: ${{ steps.detect.outputs.has_tauri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect Tauri project
        id: detect
        shell: bash
        run: |
          if [[ -f src-tauri/tauri.conf.json || -f src-tauri/Tauri.toml ]]; then
            echo "has_tauri=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tauri=false" >> "$GITHUB_OUTPUT"
          fi

  publish_tauri:
    name: Build desktop (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    needs:
      - publish-web
      - detect_desktop
    if: needs.detect_desktop.outputs.has_tauri == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            label: macos-arm64
            asset_suffix: darwin_aarch64
            args: --bundles dmg
            upload_plain_binary: false
          - platform: macos-15-intel
            label: macos-x64
            asset_suffix: darwin_x64
            args: --bundles dmg
            upload_plain_binary: false
          - platform: ubuntu-22.04
            label: linux-x64
            asset_suffix: linux_x64
            args: --no-bundle
            upload_plain_binary: true
          - platform: windows-latest
            label: windows-x64
            asset_suffix: windows_x64
            args: --no-bundle
            upload_plain_binary: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          cache-bin: "false"

      - name: Verify Rust toolchain
        shell: bash
        run: |
          which cargo
          cargo --version

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Install Tauri CLI dependencies
        run: npm ci

      - name: Build and upload Tauri binaries
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: false

      - name: Collect desktop workflow artifact
        shell: bash
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          ASSET_SUFFIX: ${{ matrix.asset_suffix }}
        run: |
          mkdir -p release-assets/desktop
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const artifacts = JSON.parse(process.env.ARTIFACT_PATHS || '[]');
          const version = (process.env.GITHUB_REF_NAME || 'v0.0.0').replace(/^v/, '');
          const suffix = process.env.ASSET_SUFFIX;
          let copied = 0;
          for (const file of artifacts) {
            if (!fs.existsSync(file)) {
              console.warn(`Missing Tauri artifact: ${file}`);
              continue;
            }
            const ext = path.extname(file);
            const name = `Calabash_${version}_${suffix}${ext}`;
            fs.cpSync(file, path.join('release-assets', 'desktop', name), { recursive: true });
            copied++;
          }
          if (copied === 0) {
            throw new Error('No Tauri artifacts were available to upload.');
          }
          NODE

      - name: Upload desktop assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${GITHUB_REF_NAME}" release-assets/desktop/* --clobber

      - name: Upload desktop workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: calabash-desktop-${{ github.ref_name }}-${{ matrix.label }}
          path: release-assets/desktop/*

  mirror_cnb_release:
    name: Mirror release assets to CNB
    runs-on: ubuntu-latest
    needs:
      - publish-web
      - publish_tauri
    if: needs.publish-web.result == 'success' && needs.publish_tauri.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install CNB CLI
        run: npm install -g @cnbcool/cnb-cli

      - name: Mirror GitHub Release assets to CNB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_API_ENDPOINT: https://api.cnb.cool
          CNB_REPO: Guesswhat-Studio/Calabash
          MIN_GITHUB_ASSET_COUNT: "5"
          CNB_ASSET_TTL: "0"
          CNB_DELETE_OLD_RELEASES: "true"
        run: node scripts/mirror-github-release-to-cnb.mjs
