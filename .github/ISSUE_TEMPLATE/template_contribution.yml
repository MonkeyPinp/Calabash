name: Template contribution
description: Propose a reusable Calabash template for puzzles, contests, books, or cases.
title: "[Template]: "
labels: ["template", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping Calabash grow a useful template library.
        Please attach a `.calabash-template.json` exported from Calabash, or open a PR adding it under `app/src/templates/`.
        If you only want to show a template idea for discussion, use Show and tell instead: https://github.com/Guesswhat-Studio/Calabash/discussions/new?category=show-and-tell
  - type: input
    id: use_case
    attributes:
      label: Use case
      description: What scenario is this template for?
      placeholder: "Mystery puzzle contest, long novel, drama notes, clue board..."
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - English
        - Chinese Simplified
        - Japanese
        - Spanish
        - Portuguese
        - Multilingual
        - Other
    validations:
      required: true
  - type: dropdown
    id: maturity
    attributes:
      label: Template maturity
      options:
        - Ready to bundle
        - Needs review
        - Concept only
        - Not sure
    validations:
      required: true
  - type: textarea
    id: structure
    attributes:
      label: Template structure
      description: List the sections, placeholder nodes, and intended workflow.
      placeholder: "Sections: People, Clues, Timeline..."
    validations:
      required: true
  - type: textarea
    id: file
    attributes:
      label: Template JSON or PR link
      description: Paste a short snippet, attach the exported file, or link the PR.
    validations:
      required: true
  - type: textarea
    id: testing
    attributes:
      label: Testing notes
      description: Tell us whether you imported it into a fresh Calabash library and whether chapter safety, groups, notes, and relationships behaved as intended.
      placeholder: "Imported into a fresh library, created one book from it, moved the chapter slider, and exported again."
  - type: textarea
    id: copyright
    attributes:
      label: Copyright and spoilers
      description: Confirm the template contains no copyrighted story text, private data, or unmarked spoilers.
      placeholder: "This is an original blank template and contains no story spoilers."
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Contribution checks
      options:
        - label: The template does not include copyrighted story text, private reading notes, or unmarked spoilers.
          required: true
        - label: The template is useful without needing Calabash to infer or solve anything automatically.
          required: true
